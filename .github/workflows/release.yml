name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual release)'
        type: boolean
        default: false

permissions:
  contents: write

env:
  APP_NAME: IgniteroLauncher
  BUNDLE_NAME: IgniteroLauncher.app
  DMG_NAME: IgniteroLauncher.dmg

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          YEAR=$(date +%y)
          MONTH=$(date +%-m)

          CURRENT=$(grep 'CFBundleShortVersionString' -A1 Resources/Info.plist | grep '<string>' | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
          echo "Current version: ${CURRENT}"

          if echo "${CURRENT}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            OLD_YEAR=$(echo "${CURRENT}" | cut -d. -f1)
            OLD_MONTH=$(echo "${CURRENT}" | cut -d. -f2)
            OLD_COUNTER=$(echo "${CURRENT}" | cut -d. -f3)
            if [ "${OLD_YEAR}" = "${YEAR}" ] && [ "${OLD_MONTH}" = "${MONTH}" ]; then
              NEW_COUNTER=$((OLD_COUNTER + 1))
            else
              NEW_COUNTER=0
            fi
          else
            NEW_COUNTER=0
          fi

          NEW_VERSION="${YEAR}.${MONTH}.${NEW_COUNTER}"
          echo "New version: ${NEW_VERSION}"

          # Update Info.plist version
          sed -i "s|<string>${CURRENT}</string>|<string>${NEW_VERSION}</string>|" Resources/Info.plist

          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Commit and tag
        if: ${{ !inputs.dry_run }}
        run: |
          git add Resources/Info.plist
          git commit -m "Release ${{ steps.bump.outputs.tag }}"
          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release ${{ steps.bump.outputs.tag }}"
          git push origin HEAD "${{ steps.bump.outputs.tag }}"

      - name: Dry run info
        if: ${{ inputs.dry_run }}
        run: |
          echo "Dry run mode - skipping commit and tag"
          echo "Would release: ${{ steps.bump.outputs.tag }}"

  build:
    name: Build & Package
    needs: prepare-release
    if: ${{ !inputs.dry_run }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            swift_arch_flag: ""
          - arch: x86_64
            swift_arch_flag: "--arch x86_64"
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate emoji keywords
        run: python3 scripts/update_emoji_keywords.py

      - name: Build release binary
        run: swift build -c release ${{ matrix.swift_arch_flag }}

      - name: Create app bundle
        run: |
          BUNDLE="${{ env.BUNDLE_NAME }}"
          mkdir -p "${BUNDLE}/Contents/MacOS"
          mkdir -p "${BUNDLE}/Contents/Resources"
          cp ".build/release/${{ env.APP_NAME }}" "${BUNDLE}/Contents/MacOS/${{ env.APP_NAME }}"
          cp Resources/Info.plist "${BUNDLE}/Contents/Info.plist"
          cp Resources/AppIcon.icns "${BUNDLE}/Contents/Resources/AppIcon.icns"
          cp Resources/MenuBarIcon.png "${BUNDLE}/Contents/Resources/MenuBarIcon.png"
          cp Resources/MenuBarIcon@2x.png "${BUNDLE}/Contents/Resources/MenuBarIcon@2x.png"
          cp Resources/IgniteroLauncher.entitlements "${BUNDLE}/Contents/Resources/"
          codesign --force --sign - --entitlements Resources/IgniteroLauncher.entitlements "${BUNDLE}"

      - name: Create DMG
        run: |
          DMG_DIR=$(mktemp -d)
          cp -R "${{ env.BUNDLE_NAME }}" "${DMG_DIR}/"
          ln -s /Applications "${DMG_DIR}/Applications"
          DMG_FILE="${{ env.APP_NAME }}-${{ needs.prepare-release.outputs.version }}-${{ matrix.arch }}.dmg"
          hdiutil create -volname "${{ env.APP_NAME }}" \
            -srcfolder "${DMG_DIR}" \
            -ov -format UDZO \
            "${DMG_FILE}"
          xattr -cr "${DMG_FILE}"
          echo "DMG_FILE=${DMG_FILE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: ${{ env.DMG_FILE }}
          retention-days: 7

  create-release:
    name: Create Release
    needs: [prepare-release, build]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display artifacts
        run: ls -laR ./artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: Release ${{ needs.prepare-release.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ./artifacts/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
