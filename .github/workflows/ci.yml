name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate emoji keywords
        run: python3 scripts/update_emoji_keywords.py

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test
